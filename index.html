<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>טבלת דירוג שש-בש</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container" style="max-width:760px">

    <!-- Header -->
    <header class="page-header">
      <div style="font-size:3rem;line-height:1">🎲</div>
      <h1 class="page-title">טבלת דירוג שש-בש</h1>
      <p class="page-subtitle" id="lastUpdated"></p>
    </header>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner-border text-secondary" role="status"></div>
      <p class="mt-3">טוען נתונים...</p>
    </div>

    <!-- Error -->
    <div id="error" style="display:none">
      לא ניתן לטעון נתונים. נסה לרענן את הדף.
    </div>

    <!-- Content -->
    <div id="content" style="display:none">

      <!-- Standings -->
      <div class="standings-card mb-5">
        <table class="standings-table">
          <thead>
            <tr>
              <th style="text-align:center">#</th>
              <th>שחקן</th>
              <th title="משחקים שוחקו">מ&quot;מ</th>
              <th title="ניצחונות">נ׳</th>
              <th title="הפסדים">ה׳</th>
              <th title="נקודות (ניצחון=2, הפסד=1)">נקודות</th>
              <th title="גיימים שהובקעו (מכריע בתיקו)">גיימים</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>

      <!-- Recent matches -->
      <p class="section-title">תוצאות אחרונות</p>
      <div id="matchesList"></div>

    </div>

  </div><!-- /container -->

  <!-- Subtle admin link -->
  <a href="admin.html" class="admin-link" title="ניהול">⚙</a>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/github-api.js"></script>
  <script src="js/leaderboard.js"></script>
</body>
</html>
